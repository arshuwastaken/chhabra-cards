<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhabra Cards | Smart Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('bg.jpg') center/cover fixed;
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #snow-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .snowflake { position: absolute; background: white; border-radius: 50%; opacity: 0.5; filter: blur(1px); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh) translateX(20px); } }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { width: 45px; height: 45px; border-radius: 10px; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; position: relative; z-index: 1; }

        /* --- Search Bar with Prediction Style --- */
        .search-section {
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
        }

        .search-box-wrapper { position: relative; width: 100%; }
        .search-box-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .search-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }

        /* --- Stats Cards --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }
        .stat-card span { display: block; font-size: 0.8rem; color: #94a3b8; }
        .stat-card strong { font-size: 1.2rem; color: var(--primary); }

        /* --- UI Components --- */
        .btn {
            padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .customer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .customer-card {
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; transition: 0.3s;
        }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .status-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        /* --- Modals --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; }

        @media (max-width: 600px) { header { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>

<div id="snow-container"></div>

<header>
    <div class="logo-area">
        <img src="logo.png" alt="logo">
        <h2>Chhabra Cards</h2>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-primary" onclick="toggleModal('customerModal', true)"><i class="fa-solid fa-plus"></i> Add</button>
        <button class="btn btn-danger" onclick="deleteAllData()"><i class="fa-solid fa-trash"></i> Reset</button>
    </div>
</header>

<div class="container">
    <div class="search-section">
        <div class="search-box-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search customer name (YouTube style prediction)..." oninput="handleSearch()">
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span>Total Customers</span><strong id="statTotal">0</strong></div>
        <div class="stat-card"><span>Money Pending</span><strong id="statPending" style="color:var(--danger)">₹0</strong></div>
        <div class="stat-card"><span>Total Business</span><strong id="statBusiness" style="color:var(--success)">₹0</strong></div>
    </div>

    <div class="customer-grid" id="customerGrid"></div>
</div>

<div class="modal" id="customerModal">
    <div class="modal-content">
        <h3 style="margin-bottom:20px">New Customer</h3>
        <input type="text" id="custName" placeholder="Name">
        <input type="text" id="custMobile" placeholder="Mobile">
        <input type="number" id="custPrice" placeholder="Price (₹)">
        <div style="display:flex; gap:10px">
            <button class="btn btn-primary" style="flex:1" onclick="addCustomer()">Save</button>
            <button class="btn" style="flex:1; background:#334155" onclick="toggleModal('customerModal', false)">Close</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA4YxdiAtTJycGPgSmRWt9Iii9gkjvlfuI",
        authDomain: "chhabra-cards.firebaseapp.com",
        projectId: "chhabra-cards",
        storageBucket: "chhabra-cards.firebasestorage.app",
        messagingSenderId: "427204441564",
        appId: "1:427204441564:web:f490107f6c2e50d48c4b19"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allData = [];

    // --- Snow ---
    setInterval(() => {
        const f = document.createElement('div');
        f.className = 'snowflake';
        f.style.left = Math.random() * 100 + 'vw';
        f.style.width = f.style.height = Math.random() * 4 + 2 + 'px';
        f.style.animationDuration = Math.random() * 3 + 5 + 's';
        document.getElementById('snow-container').appendChild(f);
        setTimeout(() => f.remove(), 8000);
    }, 300);

    // --- Core Logic ---
    window.toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';

    window.addCustomer = async () => {
        const name = document.getElementById('custName').value;
        const mobile = document.getElementById('custMobile').value;
        const price = document.getElementById('custPrice').value;
        if(!name || !price) return alert('Name and Price are required!');
        
        await addDoc(collection(db, 'customers'), {
            name, mobile, price: parseInt(price),
            workDone: false, moneyDone: false,
            createdAt: Date.now()
        });
        toggleModal('customerModal', false);
        document.querySelectorAll('input').forEach(i => i.value = '');
    };

    window.handleSearch = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(c => c.name.toLowerCase().includes(term));
        render(filtered);
    };

    function updateStats() {
        const total = allData.length;
        const pending = allData.filter(c => !c.moneyDone).reduce((sum, c) => sum + (parseInt(c.price) || 0), 0);
        const business = allData.reduce((sum, c) => sum + (parseInt(c.price) || 0), 0);
        
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statPending').innerText = '₹' + pending;
        document.getElementById('statBusiness').innerText = '₹' + business;
    }

    function render(dataList) {
        const grid = document.getElementById('customerGrid');
        grid.innerHTML = '';
        dataList.forEach(c => {
            const card = document.createElement('div');
            card.className = 'customer-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="avatar">${c.name[0].toUpperCase()}</div>
                    <div>
                        <h4 style="color:white">${c.name}</h4>
                        <small style="color:#94a3b8">${c.mobile || 'No Mobile'}</small>
                    </div>
                </div>
                <div class="status-row"><span>Deal Amount</span><strong>₹${c.price}</strong></div>
                <div class="status-row"><span>Work</span><span style="color:${c.workDone?'#22c55e':'#f59e0b'}">${c.workDone?'Ready':'Pending'}</span></div>
                <div class="status-row"><span>Payment</span><span style="color:${c.moneyDone?'#22c55e':'#ef4444'}">${c.moneyDone?'Received':'Unpaid'}</span></div>
                <div class="actions">
                    <button class="btn" style="background:${c.workDone?'#334155':''}; border:1px solid var(--primary)" onclick="updateStatus('${c.id}', 'workDone', ${c.workDone})">${c.workDone?'Undo':'Done'}</button>
                    <button class="btn" style="background:${c.moneyDone?'#334155':''}; border:1px solid var(--success)" onclick="updateStatus('${c.id}', 'moneyDone', ${c.moneyDone})">${c.moneyDone?'Undo':'Paid'}</button>
                </div>
                <button onclick="deleteCust('${c.id}')" style="background:none; border:none; color:#ef4444; width:100%; margin-top:10px; cursor:pointer; font-size:0.8rem">Remove Entry</button>
            `;
            grid.appendChild(card);
        });
    }

    window.updateStatus = async (id, field, val) => await updateDoc(doc(db, 'customers', id), { [field]: !val });
    window.deleteCust = async (id) => { if(confirm('Delete this?')) await deleteDoc(doc(db, 'customers', id)); };
    window.deleteAllData = async () => {
        if(confirm('Delete ALL data?')) {
            const snap = await getDocs(collection(db, 'customers'));
            snap.forEach(async d => await deleteDoc(doc(db, 'customers', d.id)));
        }
    };

    onSnapshot(collection(db, 'customers'), (snap) => {
        allData = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.createdAt - a.createdAt);
        updateStats();
        handleSearch(); // Keeps search active during real-time updates
    });
</script>
</body>
</html>
