<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhabra Flex Prints Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:url('bg.png') center/cover fixed;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.78);
    z-index:-2;
}

.snow{
    position:fixed;
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    opacity:0.7;
    animation:fall linear infinite;
    z-index:-1;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
    }
    to{
        transform:translateY(110vh);
    }
}

header{
    width:100%;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    position:sticky;
    top:0;
    z-index:999;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-area img{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
}

.logo-area h1{
    font-size:24px;
}

.top-buttons{
    display:flex;
    gap:10px;
}

.top-buttons button{
    padding:12px 18px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.add-btn-top{
    background:#2563eb;
}

.delete-all-btn{
    background:#dc2626;
}

.top-buttons button:hover{
    transform:scale(1.05);
}

.container{
    padding:25px;
}

.top-menu{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:25px;
}

.menu-tabs{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.menu-tabs button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.menu-tabs button.active{
    background:#2563eb;
}

.search-box{
    position:relative;
}

.search-box input{
    width:300px;
    padding:12px 16px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    outline:none;
    font-weight:bold;
}

.search-results{
    position:absolute;
    top:55px;
    left:0;
    width:100%;
    background:#111827;
    border-radius:12px;
    overflow:hidden;
    display:none;
    z-index:100;
    border:1px solid rgba(255,255,255,0.08);
}

.search-item{
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.search-item:hover{
    background:#1d4ed8;
}

.customer-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.customer-box{
    background:rgba(17,17,17,0.9);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    overflow:hidden;
    position:relative;
    backdrop-filter:blur(10px);
}

.customer-box::before{
    content:'';
    position:absolute;
    width:160px;
    height:160px;
    background:rgba(37,99,235,0.15);
    border-radius:50%;
    top:-60px;
    right:-60px;
}

.customer-header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
}

.customer-header img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
}

.customer-details{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.detail{
    background:#1a1a1a;
    padding:12px;
    border-radius:12px;
}

.status-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:18px;
}

.status-buttons button{
    flex:1;
    min-width:120px;
    padding:12px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.work-btn{
    background:#9333ea;
}

.money-btn{
    background:#16a34a;
}

.delete-btn{
    background:#dc2626;
}

.modal,
.confirm-box{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-content,
.confirm-content{
    width:90%;
    max-width:420px;
    background:#111827;
    border-radius:20px;
    padding:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.modal-content input{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1f2937;
    color:white;
}

.modal-content button,
.confirm-buttons button{
    padding:14px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.confirm-buttons{
    display:flex;
    gap:10px;
}

@media(max-width:700px){

    header{
        flex-direction:column;
        gap:15px;
    }

    .top-buttons{
        width:100%;
    }

    .top-buttons button{
        flex:1;
    }

    .search-box input{
        width:100%;
    }

}

</style>
</head>
<body>

<div class="snow" style="left:5%; animation-duration:12s;"></div>
<div class="snow" style="left:15%; animation-duration:15s;"></div>
<div class="snow" style="left:25%; animation-duration:11s;"></div>
<div class="snow" style="left:35%; animation-duration:16s;"></div>
<div class="snow" style="left:45%; animation-duration:13s;"></div>
<div class="snow" style="left:55%; animation-duration:18s;"></div>
<div class="snow" style="left:65%; animation-duration:12s;"></div>
<div class="snow" style="left:75%; animation-duration:14s;"></div>
<div class="snow" style="left:85%; animation-duration:17s;"></div>
<div class="snow" style="left:95%; animation-duration:10s;"></div>

<header>

<div class="logo-area">
    <img src="logo.png">
    <h1>Chhabra Flex Prints</h1>
</div>

<div class="top-buttons">
    <button class="add-btn-top" onclick="openModal()">+ Add Customer</button>
    <button class="delete-all-btn" onclick="deleteAllData()">Delete All Data</button>
</div>

</header>

<div class="container">

<div class="top-menu">

<div class="menu-tabs">
    <button class="active" onclick="filterCustomers('all', this)">All Customers</button>
    <button onclick="filterCustomers('pending', this)">Money Pending</button>
    <button onclick="filterCustomers('done', this)">All Done</button>
</div>

<div class="search-box">

<input 
type="text" 
id="searchInput"
placeholder="Search Customer..."
onkeyup="searchCustomers()"
>

<div class="search-results" id="searchResults"></div>

</div>

</div>

<div class="customer-grid" id="customerGrid"></div>

</div>

<div class="modal" id="customerModal">

<div class="modal-content">

<h2>Add Customer</h2>

<input type="text" id="customerName" placeholder="Customer Name">

<input type="text" id="customerMobile" placeholder="Mobile Number">

<input type="number" id="customerPrice" placeholder="Price">

<button style="background:#2563eb;" onclick="addCustomer()">Add Customer</button>

<button style="background:#dc2626;" onclick="closeModal()">Cancel</button>

</div>

</div>

<div class="confirm-box" id="confirmBox">

<div class="confirm-content">

<h2>Confirm Delete?</h2>

<p>Are you sure you want to delete this customer?</p>

<div class="confirm-buttons">
<button style="background:#dc2626;" onclick="confirmDelete()">Delete</button>
<button style="background:#374151;" onclick="closeConfirm()">Cancel</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
updateDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA4YxdiAtTJycGPgSmRWt9Iii9gkjvlfuI",
authDomain: "chhabra-cards.firebaseapp.com",
projectId: "chhabra-cards",
storageBucket: "chhabra-cards.firebasestorage.app",
messagingSenderId: "427204441564",
appId: "1:427204441564:web:f490107f6c2e50d48c4b19",
measurementId: "G-6098W7DVN0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const customerGrid = document.getElementById('customerGrid');

let currentFilter = 'all';
let deleteId = null;
let allCustomers = [];

window.openModal = () => {
document.getElementById('customerModal').style.display='flex';
}

window.closeModal = () => {
document.getElementById('customerModal').style.display='none';
}

window.addCustomer = async () => {

const name=document.getElementById('customerName').value;
const mobile=document.getElementById('customerMobile').value;
const price=document.getElementById('customerPrice').value;

if(!name || !mobile || !price){
alert('Fill all fields');
return;
}

await addDoc(collection(db,'customers'),{
name,
mobile,
price,
workDone:false,
moneyDone:false,
createdAt:Date.now()
});

document.getElementById('customerName').value='';
document.getElementById('customerMobile').value='';
document.getElementById('customerPrice').value='';

closeModal();

}

function renderCustomers(){

customerGrid.innerHTML='';

let filtered=allCustomers;

if(currentFilter==='pending'){
filtered=allCustomers.filter(c=>c.workDone && !c.moneyDone);
}

if(currentFilter==='done'){
filtered=allCustomers.filter(c=>c.workDone && c.moneyDone);
}

filtered.forEach(customer=>{

const div=document.createElement('div');

div.className='customer-box';

div.innerHTML=`

<div class="customer-header">
<img src="logo.png">

<div>
<h2>${customer.name}</h2>
<p>${customer.mobile}</p>
</div>

</div>

<div class="customer-details">

<div class="detail">
💰 Price: ₹${customer.price}
</div>

<div class="detail">
🛠 Work Done: ${customer.workDone ? 'Yes' : 'No'}
</div>

<div class="detail">
💵 Money Received: ${customer.moneyDone ? 'Yes' : 'No'}
</div>

</div>

<div class="status-buttons">

<button class="work-btn" onclick="toggleWork('${customer.id}', ${customer.workDone})">
${customer.workDone ? 'Work Completed' : 'Mark Work Done'}
</button>

<button class="money-btn" onclick="toggleMoney('${customer.id}', ${customer.moneyDone})">
${customer.moneyDone ? 'Money Received' : 'Money Pending'}
</button>

<button class="delete-btn" onclick="openDelete('${customer.id}')">
Delete
</button>

</div>

`;

customerGrid.appendChild(div);

});

}

window.filterCustomers=(type,btn)=>{

currentFilter=type;

document.querySelectorAll('.menu-tabs button').forEach(button=>{
button.classList.remove('active');
});

btn.classList.add('active');

renderCustomers();

}

window.toggleWork=async(id,current)=>{

await updateDoc(doc(db,'customers',id),{
workDone:!current
});

}

window.toggleMoney=async(id,current)=>{

await updateDoc(doc(db,'customers',id),{
moneyDone:!current
});

}

window.openDelete=(id)=>{

deleteId=id;

document.getElementById('confirmBox').style.display='flex';

}

window.closeConfirm=()=>{

document.getElementById('confirmBox').style.display='none';

}

window.confirmDelete=async()=>{

if(deleteId){
await deleteDoc(doc(db,'customers',deleteId));
}

closeConfirm();

}

window.deleteAllData=async()=>{

const confirmDeleteAll=confirm('Delete all customer data?');

if(!confirmDeleteAll) return;

const snapshot=await getDocs(collection(db,'customers'));

for(const document of snapshot.docs){

await deleteDoc(doc(db,'customers',document.id));

}

alert('All customer data deleted');

}

window.searchCustomers=()=>{

const value=document.getElementById('searchInput')
.value
.toLowerCase();

const results=document.getElementById('searchResults');

results.innerHTML='';

if(value===''){
results.style.display='none';
renderCustomers();
return;
}

const matched=allCustomers.filter(customer=>
customer.name.toLowerCase().includes(value)
);

results.style.display='block';

matched.forEach(customer=>{

const div=document.createElement('div');

div.className='search-item';

div.innerHTML=`
${customer.name}
`;

div.onclick=()=>{

results.style.display='none';

customerGrid.innerHTML='';

const customerDiv=document.createElement('div');

customerDiv.className='customer-box';

customerDiv.innerHTML=`

<div class="customer-header">
<img src="logo.png">

<div>
<h2>${customer.name}</h2>
<p>${customer.mobile}</p>
</div>

</div>

<div class="customer-details">

<div class="detail">
💰 Price: ₹${customer.price}
</div>

<div class="detail">
🛠 Work Done: ${customer.workDone ? 'Yes' : 'No'}
</div>

<div class="detail">
💵 Money Received: ${customer.moneyDone ? 'Yes' : 'No'}
</div>

</div>

<div class="status-buttons">

<button class="work-btn" onclick="toggleWork('${customer.id}', ${customer.workDone})">
${customer.workDone ? 'Work Completed' : 'Mark Work Done'}
</button>

<button class="money-btn" onclick="toggleMoney('${customer.id}', ${customer.moneyDone})">
${customer.moneyDone ? 'Money Received' : 'Money Pending'}
</button>

<button class="delete-btn" onclick="openDelete('${customer.id}')">
Delete
</button>

</div>

`;

customerGrid.appendChild(customerDiv);

}

results.appendChild(div);

});

}

onSnapshot(collection(db,'customers'),(snapshot)=>{

allCustomers=[];

snapshot.forEach(docSnap=>{

allCustomers.push({
id:docSnap.id,
...docSnap.data()
});

});

renderCustomers();

});

</script>

</body>
</html>
