<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhabra Flex Prints | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('bg.jpg') center/cover fixed;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Realistic Snow Animation --- */
        #snow-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .snowflake { position: absolute; background: white; border-radius: 50%; opacity: 0.5; filter: blur(1px); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh) translateX(15px); } }

        header {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo-area img { width: 45px; height: 45px; border-radius: 10px; border: 1px solid var(--glass-border); }

        .container { padding: 30px 5%; position: relative; z-index: 1; }

        /* --- Search & Tabs Glass Design --- */
        .search-container { margin-bottom: 25px; max-width: 500px; position: relative; }
        .search-input { 
            width: 100%; padding: 14px 14px 14px 45px; 
            border-radius: 15px; border: 1px solid var(--glass-border); 
            background: var(--glass-bg); color: white; outline: none;
            backdrop-filter: var(--glass-blur); font-size: 1rem;
        }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        .menu-tabs { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { 
            padding: 12px 24px; border: 1px solid var(--glass-border); border-radius: 12px; 
            background: var(--glass-bg); color: #cbd5e1; cursor: pointer; font-weight: 600;
            backdrop-filter: var(--glass-blur); transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }

        /* --- Custom Glass Cards --- */
        .customer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 25px; }
        .customer-card { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            border-radius: 24px; padding: 25px; backdrop-filter: var(--glass-blur);
            transition: 0.3s;
        }
        .customer-card:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-5px); }

        .detail-row { 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.2); padding: 12px 15px; border-radius: 12px; margin-bottom: 10px;
        }

        .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .status-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        
        /* --- Fully Custom Glass Modals --- */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: rgba(20, 20, 25, 0.8); border: 1px solid var(--glass-border);
            padding: 35px; border-radius: 30px; width: 90%; max-width: 420px; 
            backdrop-filter: blur(20px); text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .modal-content input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; outline: none;
        }

        @media(max-width: 600px) { header { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>

<div id="snow-container"></div>

<header>
    <div class="logo-area">
        <img src="logo.png" alt="logo">
        <h1>Chhabra Flex Prints</h1>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" style="background: var(--primary); color:white" onclick="openModal('customerModal')">+ New Order</button>
        <button class="btn" style="background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: var(--danger)" onclick="openModal('confirmAllModal')">Reset All</button>
    </div>
</header>

<div class="container">
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search customer (YouTube speed)..." oninput="render()">
    </div>

    <div class="menu-tabs">
        <button id="tab-all" class="tab-btn active" onclick="setTab('all', this)">All Prints</button>
        <button id="tab-pending" class="tab-btn" onclick="setTab('pending', this)">Pending Payment</button>
        <button id="tab-done" class="tab-btn" onclick="setTab('done', this)">Completed</button>
    </div>

    <div class="customer-grid" id="customerGrid"></div>
</div>

<div class="modal" id="customerModal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px">✨ New Entry</h2>
        <input type="text" id="custName" placeholder="Customer Name">
        <input type="text" id="custMobile" placeholder="Contact Number">
        <input type="number" id="custPrice" placeholder="Final Price (₹)">
        <div style="display:flex; gap:10px">
            <button class="btn" style="background:var(--primary); flex:1; color:white" onclick="addCustomer()">Save Order</button>
            <button class="btn" style="background:rgba(255,255,255,0.1); flex:1; color:white" onclick="closeModal('customerModal')">Cancel</button>
        </div>
    </div>
</div>

<div class="modal" id="confirmAllModal">
    <div class="modal-content">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: var(--danger); margin-bottom: 15px;"></i>
        <h2>Reset Data?</h2>
        <p style="color:#94a3b8; margin: 15px 0">Are you sure you want to delete all entries? This cannot be undone.</p>
        <div style="display:flex; gap:10px">
            <button class="btn" style="background:var(--danger); flex:1; color:white" onclick="deleteAllData()">Yes, Delete</button>
            <button class="btn" style="background:rgba(255,255,255,0.1); flex:1; color:white" onclick="closeModal('confirmAllModal')">Back</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA4YxdiAtTJycGPgSmRWt9Iii9gkjvlfuI",
        authDomain: "chhabra-cards.firebaseapp.com",
        projectId: "chhabra-cards",
        storageBucket: "chhabra-cards.firebasestorage.app",
        messagingSenderId: "427204441564",
        appId: "1:427204441564:web:f490107f6c2e50d48c4b19"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allData = [];
    let currentTab = 'all';

    // --- Snow Logic ---
    setInterval(() => {
        const s = document.createElement('div');
        s.className = 'snowflake';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.width = s.style.height = Math.random() * 4 + 2 + 'px';
        s.style.animationDuration = Math.random() * 3 + 4 + 's';
        document.getElementById('snow-container').appendChild(s);
        setTimeout(() => s.remove(), 6000);
    }, 250);

    // --- Core Logic ---
    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    window.setTab = (t, btn) => {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    };

    window.addCustomer = async () => {
        const name = document.getElementById('custName').value;
        const mobile = document.getElementById('custMobile').value;
        const price = document.getElementById('custPrice').value;
        if(!name || !price) return;
        
        await addDoc(collection(db, 'customers'), {
            name, mobile, price,
            workDone: false, moneyDone: false,
            createdAt: Date.now()
        });
        closeModal('customerModal');
        document.querySelectorAll('input').forEach(i => i.value = '');
    };

    window.render = () => {
        const grid = document.getElementById('customerGrid');
        const term = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        let filtered = allData.filter(c => c.name.toLowerCase().includes(term));
        if(currentTab === 'pending') filtered = filtered.filter(c => c.workDone && !c.moneyDone);
        if(currentTab === 'done') filtered = filtered.filter(c => c.workDone && c.moneyDone);

        filtered.forEach(c => {
            const card = document.createElement('div');
            card.className = 'customer-card';
            card.innerHTML = `
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px">
                    <div style="width:50px; height:50px; border-radius:12px; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.5rem; font-weight:bold">${c.name[0].toUpperCase()}</div>
                    <div>
                        <h3 style="font-size:1.2rem">${c.name}</h3>
                        <p style="color:#94a3b8; font-size:0.85rem">${c.mobile || 'No Contact'}</p>
                    </div>
                </div>
                <div class="detail-row"><span>Order Price</span><strong style="color:var(--primary)">₹${c.price}</strong></div>
                <div class="detail-row"><span>Status</span><span style="color:${c.workDone?'var(--success)':'#f59e0b'}">${c.workDone?'✅ Printed':'⏳ Processing'}</span></div>
                <div class="detail-row"><span>Payment</span><span style="color:${c.moneyDone?'var(--success)':'var(--danger)'}">${c.moneyDone?'✅ Paid':'❌ Pending'}</span></div>
                
                <div class="status-btns">
                    <button class="btn" style="background:${c.workDone?'rgba(255,255,255,0.1)':'var(--primary)'}; color:white" onclick="updateStatus('${c.id}', 'workDone', ${c.workDone})">${c.workDone?'Undo':'Done'}</button>
                    <button class="btn" style="background:${c.moneyDone?'rgba(255,255,255,0.1)':'var(--success)'}; color:white" onclick="updateStatus('${c.id}', 'moneyDone', ${c.moneyDone})">${c.moneyDone?'Undo':'Paid'}</button>
                </div>
                <p onclick="del('${c.id}')" style="text-align:center; margin-top:15px; font-size:0.8rem; color:#64748b; cursor:pointer">Remove Entry</p>
            `;
            grid.appendChild(card);
        });
    };

    window.updateStatus = async (id, f, v) => await updateDoc(doc(db, 'customers', id), { [f]: !v });
    window.del = async (id) => { if(confirm('Delete order?')) await deleteDoc(doc(db, 'customers', id)); };
    
    window.deleteAllData = async () => {
        const snap = await getDocs(collection(db, 'customers'));
        snap.forEach(async d => await deleteDoc(doc(db, 'customers', d.id)));
        closeModal('confirmAllModal');
    };

    onSnapshot(collection(db, 'customers'), (snap) => {
        allData = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.createdAt - a.createdAt);
        render();
    });
</script>
</body>
</html>
