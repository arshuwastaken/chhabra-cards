<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhabra Cards Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('bg.jpg') center/cover fixed;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Smooth Snow --- */
        #snow-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .snowflake { position: absolute; background: white; border-radius: 50%; opacity: 0.6; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d0d0d;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0; z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { width: 50px; height: 50px; border-radius: 50%; }

        .top-btns { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-add { background: var(--primary); }
        .btn-reset { background: var(--danger); }

        .container { padding: 25px 5%; position: relative; z-index: 1; }

        /* --- Search Bar --- */
        .search-container { margin-bottom: 20px; width: 100%; max-width: 500px; position: relative; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; }
        .search-input { 
            width: 100%; padding: 12px 12px 12px 45px; 
            border-radius: 12px; border: 1px solid var(--glass-border); 
            background: #1a1a1a; color: white; outline: none;
        }

        /* --- Menu Tabs (Back as requested) --- */
        .menu-tabs { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 20px; border: none; border-radius: 12px; background: #111827; color: white; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); }

        /* --- Customer Cards --- */
        .customer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .customer-card { 
            background: #111; border: 1px solid var(--glass-border); 
            border-radius: 18px; padding: 20px; position: relative; 
        }

        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .card-header img { width: 45px; height: 45px; border-radius: 50%; }

        .detail-box { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 0.9rem; }
        
        .status-btns { display: flex; gap: 10px; margin-top: 15px; }
        .status-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        /* --- Modals --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #111827; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .modal-content input { padding: 14px; border-radius: 12px; border: none; background: #1f2937; color: white; }

        @media(max-width: 700px) { header { flex-direction: column; gap: 15px; } .top-btns { width: 100%; } .top-btns button { flex: 1; } }
    </style>
</head>
<body>

<div id="snow-container"></div>

<header>
    <div class="logo-area">
        <img src="logo.png" alt="logo">
        <h1>Chhabra Cards</h1>
    </div>
    <div class="top-btns">
        <button class="btn btn-add" onclick="openModal()">+ Add Customer</button>
        <button class="btn btn-reset" onclick="deleteAllData()">Delete All Data</button>
    </div>
</header>

<div class="container">
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search customer name..." oninput="renderCustomers()">
    </div>

    <div class="menu-tabs">
        <button id="tab-all" class="tab-btn active" onclick="filterData('all', this)">All Customers</button>
        <button id="tab-pending" class="tab-btn" onclick="filterData('pending', this)">Money Pending</button>
        <button id="tab-done" class="tab-btn" onclick="filterData('done', this)">All Done</button>
    </div>

    <div class="customer-grid" id="customerGrid"></div>
</div>

<div class="modal" id="customerModal">
    <div class="modal-content">
        <h2 style="text-align:center">Add Customer</h2>
        <input type="text" id="custName" placeholder="Customer Name">
        <input type="text" id="custMobile" placeholder="Mobile Number">
        <input type="number" id="custPrice" placeholder="Price (₹)">
        <button class="btn btn-add" onclick="addCustomer()">Add Customer</button>
        <button class="btn" style="background:#444" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA4YxdiAtTJycGPgSmRWt9Iii9gkjvlfuI",
        authDomain: "chhabra-cards.firebaseapp.com",
        projectId: "chhabra-cards",
        storageBucket: "chhabra-cards.firebasestorage.app",
        messagingSenderId: "427204441564",
        appId: "1:427204441564:web:f490107f6c2e50d48c4b19"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allCustomers = [];
    let currentFilter = 'all';

    // --- Snow logic ---
    setInterval(() => {
        const s = document.createElement('div');
        s.className = 'snowflake';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.width = s.style.height = Math.random() * 5 + 2 + 'px';
        s.style.animationDuration = Math.random() * 3 + 5 + 's';
        document.getElementById('snow-container').appendChild(s);
        setTimeout(() => s.remove(), 7000);
    }, 200);

    // --- Actions ---
    window.openModal = () => document.getElementById('customerModal').style.display = 'flex';
    window.closeModal = () => document.getElementById('customerModal').style.display = 'none';

    window.filterData = (type, btn) => {
        currentFilter = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCustomers();
    };

    window.addCustomer = async () => {
        const name = document.getElementById('custName').value;
        const mobile = document.getElementById('custMobile').value;
        const price = document.getElementById('custPrice').value;
        if(!name || !price) return alert('Name and Price are required');
        
        await addDoc(collection(db, 'customers'), {
            name, mobile, price,
            workDone: false, moneyDone: false,
            createdAt: Date.now()
        });
        closeModal();
        document.querySelectorAll('input').forEach(i => i.value = '');
    };

    window.renderCustomers = () => {
        const grid = document.getElementById('customerGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        let filtered = allCustomers;

        // Apply Tab Filter
        if(currentFilter === 'pending') filtered = allCustomers.filter(c => c.workDone && !c.moneyDone);
        if(currentFilter === 'done') filtered = allCustomers.filter(c => c.workDone && c.moneyDone);

        // Apply Search Filter (The "YouTube prediction" feel)
        filtered = filtered.filter(c => c.name.toLowerCase().includes(searchTerm));

        filtered.forEach(c => {
            const div = document.createElement('div');
            div.className = 'customer-card';
            div.innerHTML = `
                <div class="card-header">
                    <img src="logo.png">
                    <div>
                        <h3>${c.name}</h3>
                        <p style="font-size:0.8rem; color:#94a3b8">${c.mobile}</p>
                    </div>
                </div>
                <div class="detail-box">💰 Price: ₹${c.price}</div>
                <div class="detail-box">🛠 Work: ${c.workDone ? '✅ Done' : '⏳ Pending'}</div>
                <div class="detail-box">💵 Money: ${c.moneyDone ? '✅ Received' : '❌ Pending'}</div>
                <div class="status-btns">
                    <button style="background:#9333ea" onclick="updateStatus('${c.id}', 'workDone', ${c.workDone})">${c.workDone ? 'Undo Work' : 'Mark Done'}</button>
                    <button style="background:#16a34a" onclick="updateStatus('${c.id}', 'moneyDone', ${c.moneyDone})">${c.moneyDone ? 'Undo Money' : 'Paid'}</button>
                </div>
                <button onclick="del('${c.id}')" style="background:none; border:none; color:#ef4444; width:100%; margin-top:10px; cursor:pointer">Delete Entry</button>
            `;
            grid.appendChild(div);
        });
    };

    window.updateStatus = async (id, field, val) => await updateDoc(doc(db, 'customers', id), { [field]: !val });
    window.del = async (id) => { if(confirm('Delete customer?')) await deleteDoc(doc(db, 'customers', id)); };
    
    window.deleteAllData = async () => {
        if(confirm('Delete ALL data?')) {
            const snap = await getDocs(collection(db, 'customers'));
            snap.forEach(async d => await deleteDoc(doc(db, 'customers', d.id)));
        }
    };

    onSnapshot(collection(db, 'customers'), (snap) => {
        allCustomers = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.createdAt - a.createdAt);
        renderCustomers();
    });
</script>
</body>
</html>
