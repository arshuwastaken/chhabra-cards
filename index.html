<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhabra Cards Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:url('bg.jpg') center/cover fixed;
    color:white;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.78);
    backdrop-filter:blur(2px);
    z-index:-2;
}

.snow{
    position:fixed;
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:fall linear infinite;
    z-index:-1;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
    }
    to{
        transform:translateY(110vh);
    }
}
    color:white;
    min-height:100vh;
}

header{
    width:100%;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0d0d0d;
    border-bottom:1px solid rgba(255,255,255,0.1);
    position:sticky;
    top:0;
    z-index:999;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-area img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
}

.logo-area h1{
    font-size:22px;
}

.top-buttons{
    display:flex;
    gap:10px;
}

.top-buttons button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.top-buttons button:hover{
    transform:scale(1.05);
}

.container{
    padding:25px;
}

.menu-tabs{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.menu-tabs button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.menu-tabs button.active{
    background:#2563eb;
}

.customer-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.customer-box{
    background:#111111;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:20px;
    position:relative;
    overflow:hidden;
}

.customer-box::before{
    content:'';
    position:absolute;
    width:150px;
    height:150px;
    background:rgba(37,99,235,0.15);
    border-radius:50%;
    top:-60px;
    right:-60px;
}

.customer-header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
}

.customer-header img{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
}

.customer-details{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
}

.detail{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
}

.status-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.status-buttons button{
    flex:1;
    min-width:120px;
    padding:12px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.work-btn{
    background:#9333ea;
}

.money-btn{
    background:#16a34a;
}

.pending-btn{
    background:#dc2626;
}

.delete-btn{
    background:#ef4444;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    background:#111827;
    width:90%;
    max-width:420px;
    border-radius:20px;
    padding:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.modal-content h2{
    text-align:center;
}

.modal-content input{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1f2937;
    color:white;
}

.modal-content button{
    padding:14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.add-btn{
    background:#2563eb;
    color:white;
}

.cancel-btn{
    background:#ef4444;
    color:white;
}

.confirm-box{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.confirm-content{
    background:#111827;
    padding:25px;
    border-radius:18px;
    width:90%;
    max-width:350px;
    text-align:center;
}

.confirm-buttons{
    display:flex;
    gap:12px;
    margin-top:20px;
}

.confirm-buttons button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.confirm-delete{
    background:#dc2626;
}

.confirm-cancel{
    background:#374151;
}

@media(max-width:700px){

    header{
        flex-direction:column;
        gap:15px;
    }

    .top-buttons{
        width:100%;
    }

    .top-buttons button{
        flex:1;
    }

}

</style>
</head>
<body>

<div class="snow" style="left:5%; animation-duration:12s; animation-delay:0s;"></div>
<div class="snow" style="left:15%; animation-duration:16s; animation-delay:2s;"></div>
<div class="snow" style="left:25%; animation-duration:10s; animation-delay:1s;"></div>
<div class="snow" style="left:35%; animation-duration:18s; animation-delay:3s;"></div>
<div class="snow" style="left:45%; animation-duration:14s; animation-delay:5s;"></div>
<div class="snow" style="left:55%; animation-duration:11s; animation-delay:2s;"></div>
<div class="snow" style="left:65%; animation-duration:17s; animation-delay:4s;"></div>
<div class="snow" style="left:75%; animation-duration:13s; animation-delay:1s;"></div>
<div class="snow" style="left:85%; animation-duration:15s; animation-delay:3s;"></div>
<div class="snow" style="left:95%; animation-duration:12s; animation-delay:2s;"></div>

<header>

    <div class="logo-area">
        <img src="logo.png" alt="logo">
        <h1>Chhabra Cards</h1>
    </div>

    <div class="top-buttons">
        <button onclick="openModal()">+ Add Customer</button>
        <button style="background:#dc2626;" onclick="deleteAllData()">Delete All Data</button>
    </div>

</header>

<div class="container">

    <div class="menu-tabs">
        <button class="active" onclick="filterCustomers('all', this)">All Customers</button>
        <button onclick="filterCustomers('pending', this)">Money Pending</button>
        <button onclick="filterCustomers('done', this)">All Done</button>
    </div>

    <div class="customer-grid" id="customerGrid"></div>

</div>

<div class="modal" id="customerModal">

    <div class="modal-content">

        <h2>Add Customer</h2>

        <input type="text" id="customerName" placeholder="Customer Name">

        <input type="text" id="customerMobile" placeholder="Mobile Number">

        <input type="number" id="customerPrice" placeholder="Price">

        <button class="add-btn" onclick="addCustomer()">Add Customer</button>

        <button class="cancel-btn" onclick="closeModal()">Cancel</button>

    </div>

</div>

<div class="confirm-box" id="confirmBox">

    <div class="confirm-content">

        <h2>Confirm Delete?</h2>

        <p>Are you sure you want to delete this customer?</p>

        <div class="confirm-buttons">
            <button class="confirm-delete" onclick="confirmDelete()">Delete</button>
            <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
        </div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    deleteDoc,
    doc,
    updateDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4YxdiAtTJycGPgSmRWt9Iii9gkjvlfuI",
  authDomain: "chhabra-cards.firebaseapp.com",
  projectId: "chhabra-cards",
  storageBucket: "chhabra-cards.firebasestorage.app",
  messagingSenderId: "427204441564",
  appId: "1:427204441564:web:f490107f6c2e50d48c4b19",
  measurementId: "G-6098W7DVN0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const customerGrid = document.getElementById('customerGrid');

let currentFilter = 'all';
let deleteId = null;
let allCustomers = [];

window.openModal = () => {
    document.getElementById('customerModal').style.display = 'flex';
}

window.closeModal = () => {
    document.getElementById('customerModal').style.display = 'none';
}

window.addCustomer = async () => {

    const name = document.getElementById('customerName').value;
    const mobile = document.getElementById('customerMobile').value;
    const price = document.getElementById('customerPrice').value;

    if(!name || !mobile || !price){
        alert('Please fill all fields');
        return;
    }

    await addDoc(collection(db, 'customers'), {
        name,
        mobile,
        price,
        workDone:false,
        moneyDone:false,
        createdAt:Date.now()
    });

    document.getElementById('customerName').value = '';
    document.getElementById('customerMobile').value = '';
    document.getElementById('customerPrice').value = '';

    closeModal();
}

function renderCustomers(){

    customerGrid.innerHTML = '';

    let filtered = allCustomers;

    if(currentFilter === 'pending'){
        filtered = allCustomers.filter(c => c.workDone && !c.moneyDone);
    }

    if(currentFilter === 'done'){
        filtered = allCustomers.filter(c => c.workDone && c.moneyDone);
    }

    filtered.forEach(customer => {

        const div = document.createElement('div');
        div.className = 'customer-box';

        div.innerHTML = `

        <div class="customer-header">
            <img src="logo.png">
            <div>
                <h2>${customer.name}</h2>
                <p>${customer.mobile}</p>
            </div>
        </div>

        <div class="customer-details">
            <div class="detail">
                💰 Price: ₹${customer.price}
            </div>

            <div class="detail">
                🛠 Work Done: ${customer.workDone ? 'Yes' : 'No'}
            </div>

            <div class="detail">
                💵 Money Received: ${customer.moneyDone ? 'Yes' : 'No'}
            </div>
        </div>

        <div class="status-buttons">

            <button class="work-btn" onclick="toggleWork('${customer.id}', ${customer.workDone})">
                ${customer.workDone ? 'Work Completed' : 'Mark Work Done'}
            </button>

            <button class="money-btn" onclick="toggleMoney('${customer.id}', ${customer.moneyDone})">
                ${customer.moneyDone ? 'Money Received' : 'Money Pending'}
            </button>

            <button class="pending-btn" onclick="openDelete('${customer.id}')">
                Delete
            </button>

        </div>

        `;

        customerGrid.appendChild(div);

    });
}

window.filterCustomers = (type, btn) => {

    currentFilter = type;

    document.querySelectorAll('.menu-tabs button').forEach(button => {
        button.classList.remove('active');
    });

    btn.classList.add('active');

    renderCustomers();
}

window.toggleWork = async (id, current) => {

    await updateDoc(doc(db, 'customers', id), {
        workDone: !current
    });
}

window.toggleMoney = async (id, current) => {

    await updateDoc(doc(db, 'customers', id), {
        moneyDone: !current
    });
}

window.openDelete = (id) => {
    deleteId = id;
    document.getElementById('confirmBox').style.display = 'flex';
}

window.closeConfirm = () => {
    document.getElementById('confirmBox').style.display = 'none';
}

window.confirmDelete = async () => {

    if(deleteId){
        await deleteDoc(doc(db, 'customers', deleteId));
    }

    closeConfirm();
}

window.deleteAllData = async () => {

    const confirmDeleteAll = confirm('Delete all customer data?');

    if(!confirmDeleteAll) return;

    const snapshot = await getDocs(collection(db, 'customers'));

    for (const document of snapshot.docs) {
        await deleteDoc(doc(db, 'customers', document.id));
    }

    alert('All customer data deleted');
}

onSnapshot(collection(db, 'customers'), (snapshot) => {

    allCustomers = [];

    snapshot.forEach(docSnap => {

        allCustomers.push({
            id: docSnap.id,
            ...docSnap.data()
        });

    });

    renderCustomers();

});

</script>

</body>
</html>
