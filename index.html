<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhabra Cards Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050505;
    color:white;
    min-height:100vh;
}

header{
    width:100%;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0d0d0d;
    border-bottom:1px solid rgba(255,255,255,0.1);
    position:sticky;
    top:0;
    z-index:999;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-area img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
}

.top-buttons button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    font-weight:bold;
}

.container{
    padding:25px;
}

.menu-tabs{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.menu-tabs button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.menu-tabs button.active{
    background:#2563eb;
}

.customer-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.customer-box{
    background:#111111;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:20px;
}

.detail{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.status-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.status-buttons button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.work-btn{
    background:#9333ea;
}

.money-btn{
    background:#16a34a;
}

.pending-btn{
    background:#dc2626;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#111827;
    width:90%;
    max-width:420px;
    border-radius:20px;
    padding:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.modal-content input{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1f2937;
    color:white;
}

.modal-content button{
    padding:14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.add-btn{
    background:#2563eb;
    color:white;
}

.cancel-btn{
    background:#ef4444;
    color:white;
}

.confirm-box{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
}

.confirm-content{
    background:#111827;
    padding:25px;
    border-radius:18px;
    width:90%;
    max-width:350px;
    text-align:center;
}

.confirm-buttons{
    display:flex;
    gap:12px;
    margin-top:20px;
}

.confirm-buttons button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.confirm-delete{
    background:#dc2626;
}

.confirm-cancel{
    background:#374151;
}

</style>
</head>
<body>

<header>

    <div class="logo-area">
        <img src="logo.jpg" alt="logo">
        <h1>Chhabra Cards</h1>
    </div>

    <div class="top-buttons">
        <button onclick="openModal()">+ Add Customer</button>
    </div>

</header>

<div class="container">

    <div class="menu-tabs">
        <button class="active" onclick="filterCustomers('all', this)">All Customers</button>
        <button onclick="filterCustomers('pending', this)">Money Pending</button>
        <button onclick="filterCustomers('done', this)">All Done</button>
    </div>

    <div class="customer-grid" id="customerGrid"></div>

</div>

<div class="modal" id="customerModal">

    <div class="modal-content">

        <h2>Add Customer</h2>

        <input type="text" id="customerName" placeholder="Customer Name">

        <input type="text" id="customerMobile" placeholder="Mobile Number">

        <input type="number" id="customerPrice" placeholder="Price">

        <button class="add-btn" onclick="addCustomer()">Add Customer</button>

        <button class="cancel-btn" onclick="closeModal()">Cancel</button>

    </div>

</div>

<div class="confirm-box" id="confirmBox">

    <div class="confirm-content">

        <h2>Confirm Delete?</h2>

        <p>Are you sure you want to delete this customer?</p>

        <div class="confirm-buttons">
            <button class="confirm-delete" onclick="confirmDelete()">Delete</button>
            <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
        </div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    deleteDoc,
    doc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const customerGrid = document.getElementById('customerGrid');

let currentFilter = 'all';
let deleteId = null;
let allCustomers = [];

window.openModal = () => {
    document.getElementById('customerModal').style.display = 'flex';
}

window.closeModal = () => {
    document.getElementById('customerModal').style.display = 'none';
}

window.addCustomer = async () => {

    const name = document.getElementById('customerName').value;
    const mobile = document.getElementById('customerMobile').value;
    const price = document.getElementById('customerPrice').value;

    if(!name || !mobile || !price){
        alert('Please fill all fields');
        return;
    }

    await addDoc(collection(db, 'customers'), {
        name,
        mobile,
        price,
        workDone:false,
        moneyDone:false,
        createdAt:Date.now()
    });

    closeModal();
}

function renderCustomers(){

    customerGrid.innerHTML = '';

    let filtered = allCustomers;

    if(currentFilter === 'pending'){
        filtered = allCustomers.filter(c => c.workDone && !c.moneyDone);
    }

    if(currentFilter === 'done'){
        filtered = allCustomers.filter(c => c.workDone && c.moneyDone);
    }

    filtered.forEach(customer => {

        const div = document.createElement('div');
        div.className = 'customer-box';

        div.innerHTML = `
        <h2>${customer.name}</h2>

        <div class="detail">📱 ${customer.mobile}</div>
        <div class="detail">💰 ₹${customer.price}</div>
        <div class="detail">🛠 Work Done: ${customer.workDone ? 'Yes' : 'No'}</div>
        <div class="detail">💵 Money Received: ${customer.moneyDone ? 'Yes' : 'No'}</div>

        <div class="status-buttons">

            <button class="work-btn" onclick="toggleWork('${customer.id}', ${customer.workDone})">
                Work Done
            </button>

            <button class="money-btn" onclick="toggleMoney('${customer.id}', ${customer.moneyDone})">
                Money Done
            </button>

            <button class="pending-btn" onclick="openDelete('${customer.id}')">
                Delete
            </button>

        </div>
        `;

        customerGrid.appendChild(div);

    });
}

window.filterCustomers = (type, btn) => {

    currentFilter = type;

    document.querySelectorAll('.menu-tabs button').forEach(button => {
        button.classList.remove('active');
    });

    btn.classList.add('active');

    renderCustomers();
}

window.toggleWork = async (id, current) => {

    await updateDoc(doc(db, 'customers', id), {
        workDone: !current
    });
}

window.toggleMoney = async (id, current) => {

    await updateDoc(doc(db, 'customers', id), {
        moneyDone: !current
    });
}

window.openDelete = (id) => {
    deleteId = id;
    document.getElementById('confirmBox').style.display = 'flex';
}

window.closeConfirm = () => {
    document.getElementById('confirmBox').style.display = 'none';
}

window.confirmDelete = async () => {

    if(deleteId){
        await deleteDoc(doc(db, 'customers', deleteId));
    }

    closeConfirm();
}

onSnapshot(collection(db, 'customers'), (snapshot) => {

    allCustomers = [];

    snapshot.forEach(docSnap => {

        allCustomers.push({
            id: docSnap.id,
            ...docSnap.data()
        });

    });

    renderCustomers();

});

</script>

</body>
</html>
